<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India – Watch Shows Online, Watch Movies Online</title>
    <link rel="shortcut icon" href="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2023.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>

<body>
    <div class="main">
        <nav>
            <span><img width="53" src="assets/images/logo.svg"></span>
            <div class="flex">

                <div class="lang-select">
                    <i class="fa-solid fa-language"></i>
                    <select>
                        <option value="english">English</option>
                        <option value="hindi">हिंदी</option>
                    </select>
                </div>
                <button>Sign In</button>
            </div>
        </nav>

        <div class="box"></div>

        <div class="hero">
            <span><b>Unlimited movies,<br> shows, and more</b></span>
            <span><b>Starts at ₹149. Cancel at any time.</b></span>
            <span>Ready to watch? Enter your email to create or restart your membership.</span>

            <div class="mail_str">
                <input type="text" placeholder="Email address">
                <button id="get_str_btn">Get Started <i class="fa-solid fa-angle-right"></i></button>
            </div>
        </div>

    </div>

    <div class="browse">
        <h2>Trending Now</h2>
        <div class="carousel-container">
            <button class="handle left-handle"><i class="fa-solid fa-angle-left"></i></button>
        <div class="cards">
            <div class="card">
                <span class="rank">1</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">2</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">3</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">4</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">5</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">6</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
            <div class="card">
                <span class="rank">7</span>
                <img src="assets/images/Dhurandhar.jpg" alt="Avatar" style="width:100%">
            </div>
        </div>
         <button class="handle right-handle"><i class="fa-solid fa-angle-right"></i></button>
        </div>
    </div>



<script src="script.js"></script>
</body>

</html>
